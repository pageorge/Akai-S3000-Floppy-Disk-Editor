name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project AkaiS3000Editor.xcodeproj \
            -scheme AkaiS3000Editor \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/ \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Find and zip app
        run: |
          APP_PATH=$(find build/ -name "AkaiS3000Editor.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" AkaiS3000Editor.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkaiS3000Editor
          path: AkaiS3000Editor.zip
          retention-days: 30

      - name: Create latest release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto-built from the latest commit on main.
            Download AkaiS3000Editor.zip, unzip, and drag to Applications.
            Note: right-click the app and choose Open on first launch to bypass Gatekeeper.
          files: AkaiS3000Editor.zip
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
